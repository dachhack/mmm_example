name: Build & Deploy Pages
on:
  push: { branches: [main] }
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency: { group: "pages", cancel-in-progress: true }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Guard — dashboard data must be precomputed on the VM
        run: |
          if [ ! -d docs/data ] || [ -z "$(ls -A docs/data 2>/dev/null)" ]; then
            echo "::error::docs/data/ is empty. Run scripts/run_fits.sh on the VM first (see docs/INFRA.md)."
            exit 1
          fi
      # Enable Pages for the repo (source: Actions) on first run. Works now that the repo is
      # public; on a private Free-plan repo Pages is unavailable and this step fails.
      - uses: actions/configure-pages@v5
        with: { enablement: true }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Build dashboard
        run: cd dashboard && npm ci && npm run build
      # Optional: render notebooks to HTML if a Python env is set up
      - uses: actions/upload-pages-artifact@v3
        with: { path: docs }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: { name: github-pages, url: "${{ steps.deploy.outputs.page_url }}" }
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
