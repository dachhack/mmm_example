name: MMM sweep (parallel compute)

# The heavy MMM compute — off the ephemeral web container, onto CI. Each (saturation × confound ×
# seed) cell is INDEPENDENT, so we fan them out across runners as a matrix: an N-cell sweep finishes
# in ~one cell's wall-clock instead of N× sequential, and no job risks the per-job time limit.
# Cells upload their graded snapshot as an artifact; a single aggregate job collects them, rebuilds
# the multi-seed leaderboard + which-engine-when guide, and commits once (no parallel-git races).
#
# Run it: Actions ▸ "MMM sweep (parallel compute)" ▸ Run workflow (set saturations/confounds/seeds).
# NOTE: PyMC samples with cores=1 (Actions runners segfault on multi-core compiled pytensor — see
# CLAUDE.md); each cell is its own runner so wall-clock is fine. For multi-core, use a real VM
# (scripts/run_remote.sh).

on:
  workflow_dispatch:
    inputs:
      saturations:
        description: "saturation-scale levels (space-separated; <1 = more saturated)"
        default: "0.5 1.0 2.0"
      confounds:
        description: "target spend↔season confound levels"
        default: "0.6 0.3"
      seeds:
        description: "seeds per cell"
        default: "11 22 33 44 55"

permissions:
  contents: write

concurrency:
  group: mmm-sweep
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      count: ${{ steps.gen.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - id: gen
        run: |
          python scripts/ci_matrix.py "${{ inputs.saturations }}" "${{ inputs.confounds }}" "${{ inputs.seeds }}" >> "$GITHUB_OUTPUT" 2> count.txt
          cat count.txt >> "$GITHUB_OUTPUT"

  cell:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - name: Install engines (PyMC + Meridian/TensorFlow)
        run: |
          python -m pip install -U pip
          pip install -e ".[fit,meridian]"
      - name: Run cell ${{ matrix.cell.tag }}
        run: bash scripts/run_one_cell.sh "${{ matrix.cell.seed }}" "${{ matrix.cell.sat }}" "${{ matrix.cell.cf }}" "out/run_${{ matrix.cell.tag }}.json"
      - uses: actions/upload-artifact@v4
        with:
          name: snap-${{ matrix.cell.tag }}
          path: out/run_${{ matrix.cell.tag }}.json
          retention-days: 7

  aggregate:
    needs: cell
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install light deps (aggregation only)
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Collect cell snapshots
        uses: actions/download-artifact@v4
        with:
          pattern: snap-*
          path: docs/robustness/conditional
          merge-multiple: true
      - name: Rebuild leaderboards + decision guide
        run: |
          python scripts/conditional.py
          python scripts/robustness.py || true
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/robustness/conditional docs/conditional docs/robustness || true
          git commit -m "sweep(CI): ${{ needs.setup.outputs.count }} cells [skip ci]" || { echo "nothing to commit"; exit 0; }
          git push origin HEAD:${{ github.ref_name }}
